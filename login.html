<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Origema</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <div class="container-1">

        <h1 class="logo">
            <a href="index.html">
                <img src="PNGs/ORIGEMA PRETO.png" alt="logo-principal">
            </a>
        </h1>

        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="contato.html">CONTATO</a></li>
                <li><a href="historia.html" class="clique">CLIQUE AQUI</a></li>
                <li><a href="produtos.html">PRODUTOS</a></li>
            </ul>
        </nav>

        <div class="icones">
            <a href="login.html"><img src="ICONS/login.png" alt="login"></a>
            <a href="favoritos.html"><img src="ICONS/coracao.png" alt="favoritos"></a>
        </div>

    </div>
</header>

<main>

    <section class="login-section">

        <div class="login-container">

            <h2>Entrar na sua conta</h2>

            <p>
                Acesse sua conta para acompanhar pedidos e salvar seus produtos favoritos.
            </p>

            <form class="login-form">

                <div class="campo">
                    <label>Email</label>
                    <input type="email" placeholder="Seu email" required>
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" placeholder="Sua senha" required>
                </div>

                <button type="submit">Entrar</button>

            </form>

            <div class="login-extra">
                <a href="#">Esqueceu sua senha?</a>
                <span>•</span>
                <a href="#">Criar conta</a>
            </div>

        </div>

    </section>

</main>

<footer>

    <div class="footer-minimal">

        <h2>Origema</h2>

        <p>
            Design sustentável que conecta pessoas, materiais e natureza.
        </p>

        <span>© 2026 Origema — Todos os direitos reservados</span>

    </div>

</footer>

</body>
</html>
